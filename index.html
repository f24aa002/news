<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>情報集約サイト Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/index.css">

</head>

<body>

  <div class="container">

    <div class="top-bar">

      <div id="clock" class="glass"></div>

      <button onclick="toggleDarkMode()">
        🌙 ダークモード
      </button>

    </div>

    <h1> 情報集約サイト</h1>

    <div class="search-area glass">

      <div class="search-group">
        <input
        type="text"
        id="search-input"
        placeholder="検索ワードを入力">
        
        <select id="search-type">
        <option value="weather">天気</option>
        <option value="news">ニュース</option>
        <option value="stock">株価</option>
      </select>
      <button onclick="unifiedSearch()">
        検索
      </button>
    </div>
    
    <div class="main-layout">

      <aside class="sidebar glass">

        <h3>☀️ 天気</h3>

        <div id="weather-container">
          読み込み中...
        </div>

        <h3>📈 株価</h3>
        
        <div id="stock-container">
          株価を検索してください
        </div>


      </aside>

      <main class="content">

        <h2 class="section-title">
          📰 最新ニュース
        </h2>

        <div class="category-buttons">

          <button onclick="loadNews('technology')">
            IT
          </button>

          <button onclick="loadNews('sports')">
            スポーツ
          </button>

          <button onclick="loadNews('business')">
            経済
          </button>

          <button onclick="loadNews('gaming')">
            ゲーム
          </button>

        </div>

        <div id="news-container"></div>

      </main>

    </div>

  </div>

  <script src="js/index.js"></script>

</body>

</html>
