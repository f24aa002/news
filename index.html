<div class="main-layout">

  <aside class="sidebar glass">

    <h3>📍 地域</h3>
    <button onclick="getCurrentLocation()">
      現在地取得
    </button>

    <h3>☀️ 天気</h3>
    <div id="weather-container">
      読み込み中...
    </div>

    <h3>📈 株価</h3>

    <input
      id="stock-input"
      placeholder="7203.T">

    <button onclick="searchStock()">
      検索
    </button>

    <div id="stock-container">
    </div>

  </aside>

  <main class="content">

    <h2>📰 最新ニュース</h2>

    <div class="category-buttons">

      <button onclick="loadNews('technology')">
        IT
      </button>

      <button onclick="loadNews('sports')">
        スポーツ
      </button>

      <button onclick="loadNews('business')">
        経済
      </button>

      <button onclick="loadNews('gaming')">
        ゲーム
      </button>

    </div>

    <div id="news-container"></div>

  </main>

</div>
